<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Booking Confirmed</title>
<link rel="stylesheet" href="css/styles.css">

<style>
body{
    font-family: Arial;
    background:#f4f7f6;
    text-align:center;
}

.container{
    margin-top:80px;
}

.card{
    background:white;
    padding:30px;
    width:350px;
    margin:auto;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
    color:#2d6a6a;
}

.btn{
    background:#2d6a6a;
    color:white;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
    <h2>MindSpace</h2>
</header>

<div class="container">
    <div class="card">
        <h1>Booking Confirmed ✅</h1>
        <p>Your appointment is successfully booked</p>

        <p><b>Date:</b> <span id="date"></span></p>
        <p><b>Time:</b> <span id="time"></span></p>

        <br>
        <button class="btn" onclick="goHome()">Go to Dashboard</button>
    </div>
</div>

<!-- FOOTER -->
<footer>
    <p>© MindSpace</p>
</footer>

<script>
const data = JSON.parse(localStorage.getItem("appointmentData"));

if(data){
    document.getElementById("date").innerText = data.date;
    document.getElementById("time").innerText = data.time;
}

function goHome(){
    window.location.href = "index.html";
}
</script>

</body>
</html>
